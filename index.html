<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Portfolio | ม.6</title>
    <style>
        /* ==========================================
           ENGINEERING THEME CONFIGURATION (CSS)
           ========================================== */
        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0b132b; /* สีน้ำเงินเข้มสไตล์ดาร์กโหมด/เทคโนโลยี */
            
            /* สร้างพื้นหลังลายตาข่าย Grid แบบแผ่นพิมพ์เขียว (Blueprint) ของวิศวกร */
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px);
            background-size: 25px 25px;
            color: #e2e8f0;
            line-height: 1.6;
        }

        /* แถบเมนูนำทาง (Navigation Bar) */
        nav {
            background-color: rgba(28, 37, 65, 0.95); 
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 2px solid #f97316; /* เส้นใต้แถบเมนู สีส้มวิศวะ */
            backdrop-filter: blur(5px);
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        nav li a {
            display: block;
            color: #94a3b8;
            text-decoration: none;
            padding: 18px 22px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        nav li a:hover {
            color: #f97316;
            text-shadow: 0 0 10px rgba(249, 115, 22, 0.6); /* เอฟเฟกต์ตัวอักษรเรืองแสง */
            background-color: #0b132b;
        }
