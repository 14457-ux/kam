<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | วิศวกรรมอุตสาหการ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --graphite-deep:   #201e26;
    --graphite:        #2c2833;
    --graphite-soft:   #3a3541;
    --mauve-gray:      #9c93a4;
    --blush:           #e9bcc7;
    --rose-gold:       #c98fa0;
    --rose-gold-light: #e3aebb;
    --pearl:           #f4ecee;
    --pearl-dim:       #cfc4c9;
    --line:            rgba(233,188,199,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Prompt',sans-serif;
    background: linear-gradient(160deg, var(--graphite-deep) 0%, var(--graphite) 55%, #262330 100%);
    color:var(--pearl);
    min-height:100vh;
  }
  /* การปรับแก้รูปภาพให้เป็นวงกลม */
  .medallion-wrap{ position:relative; width:min(100%,380px); aspect-ratio:1/1; margin:0 auto; }
  .frame{
    position:absolute;
    inset:64px;
    border-radius:50%; /* ทำให้เป็นวงกลม */
    background:linear-gradient(160deg, var(--graphite-soft), var(--graphite-deep));
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .frame img{ width:100%; height:100%; object-fit:cover; border-radius:50%; } /* ทำให้รูปข้างในเป็นวงกลม */

  /* ส่วนอื่นๆ ของหน้าเว็บ */
  .profile-container{ max-width:1100px; margin:0 auto; padding:64px 24px; display:grid; grid-template-columns:1fr 1.3fr; gap:56px; }
  .info-card{ background:rgba(244,236,238,0.03); border:1px solid rgba(233,188,199,0.1); border-radius:16px; padding:32px; margin-bottom:32px; }
  
  /* ปุ่มนำทาง */
  .page-nav-wrapper { max-width: 1100px; margin: 40px auto; padding: 0 24px; display: flex; justify-content: space-between; }
  .btn-nav { display: inline-flex; align-items: center; padding: 12px 24px; border-radius: 8px; border: 1px solid var(--line); color: var(--pearl-dim); text-decoration: none; font-family: 'Oswald', sans-serif; transition: 0.3s; }
  .btn-nav:hover { background: var(--blush); color: var(--graphite-deep); }
</style>
</head>
<body>

  <div class="profile-container">
    <section class="profile-image-section">
      <div class="medallion-wrap">
        <div class="frame">
          <img src="images/IMG_0733.jpeg" alt="รูปโปรไฟล์">
        </div>
      </div>
    </section>

    <section class="profile-info-section">
      <h1>ประวัติส่วนตัว<span>และข้อมูลทั่วไป</span></h1>
      <div class="info-card">
        <h2>ข้อมูลทั่วไป</h2>
        <p>นางสาว จิราพัชร เเก้วหาญ</p>
      </div>
    </section>
  </div>

  <div class="page-nav-wrapper">
    <a href="index.html" class="btn-nav">ย้อนกลับ</a>
    <a href="education.html" class="btn-nav">ถัดไป</a>
  </div>

</body>
</html>
