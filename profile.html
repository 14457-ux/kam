<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | วิศวกรรมอุตสาหการ</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --graphite-deep:#201e26; --graphite:#2c2833; --graphite-soft:#3a3541;
    --blush:#e9bcc7; --rose-gold:#c98fa0; --rose-gold-light:#e3aebb;
    --pearl:#f4ecee; --pearl-dim:#cfc4c9; --line:rgba(233,188,199,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{ font-family:'Prompt',sans-serif; background:linear-gradient(160deg, var(--graphite-deep) 0%, var(--graphite) 55%, #262330 100%); color:var(--pearl); min-height:100vh; }

  /* Navigation */
  nav{ display:flex; justify-content:center; padding:28px 16px; }
  .nav-pill{ display:flex; gap:6px; background:rgba(244,236,238,0.05); border:1px solid var(--line); backdrop-filter:blur(10px); border-radius:999px; padding:6px; }
  .nav-pill a{ text-decoration:none; color:var(--pearl-dim); font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:1.5px; text-transform:uppercase; padding:10px 20px; border-radius:999px; transition:0.35s; }
  .nav-pill a.active{ color:var(--graphite-deep); background:linear-gradient(135deg,var(--blush),var(--rose-gold)); }

  /* Layout */
  .profile-container{ max-width:1100px; margin:0 auto; padding:64px 24px; display:grid; grid-template-columns:1fr 1.3fr; gap:60px; }
  
  /* Gear Medallion */
  .medallion-wrap{ position:relative; width:350px; aspect-ratio:1/1; margin:0 auto; }
  .med-ring{ position:absolute; inset:0; animation:spin 90s linear infinite; }
  .med-ring svg{ width:100%; height:100%; stroke:#e9bcc7; fill:none; stroke-width:2; }
  .frame{ position:absolute; inset:60px; border-radius:50%; background:var(--graphite-soft); border:1px solid var(--line); overflow:hidden; }
  .frame img{ width:100%; height:100%; object-fit:cover; }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* Cards */
  .info-card{ background:rgba(244,236,238,0.03); border:1px solid rgba(233,188,199,0.1); border-radius:16px; padding:32px; margin-bottom:32px; }
  .info-card h2{ color:var(--blush); margin-bottom:20px; font-size:20px; }
  .info-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .info-item label{ display:block; font-size:12px; color:var(--pearl-dim); text-transform:uppercase; }

  /* Navigation Buttons */
  .page-nav-wrapper { max-width: 1100px; margin: 40px auto; padding: 0 24px; display: flex; justify-content: space-between; }
  .btn-nav { display: inline-flex; align-items: center; gap: 10px; padding: 12px 35px; border-radius: 999px; border: 1px solid var(--line); color: var(--pearl); text-decoration: none; font-family: 'Oswald', sans-serif; text-transform: uppercase; transition: 0.3s; background: rgba(244,236,238,0.05); }
  .btn-nav:hover { background: var(--blush); color: var(--graphite-deep); }
</style>
</head>
<body>

  <nav>
    <div class="nav-pill">
      <a href="index.html">Home</a>
      <a href="profile.html" class="active">Profile</a>
      <a href="education.html">Education</a>
      <a href="award.html">Award</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <main class="profile-container">
    <section class="profile-image-section">
      <div class="medallion-wrap">
        <div class="med-ring">
          <svg viewBox="0 0 200 200">
            <path d="M100 0L115 45H165L125 75L140 120L100 90L60 120L75 75L35 45H85L100 0Z"/>
            <path d="M100 200L115 155H165L125 125L140 80L100 110L60 80L75 125L35 155H85L100 200Z"/>
          </svg>
        </div>
        <div class="frame"><img src="images/IMG_0733.jpeg" alt="Profile"></div>
      </div>
    </section>

    <section class="profile-info-section">
      <h1>ประวัติส่วนตัว</h1>
      <div class="info-card">
        <h2>ข้อมูลทั่วไป</h2>
        <div class="info-grid">
          <div class="info-item"><label>ชื่อ</label><p>นางสาว จิราพัชร เเก้วหาญ</p></div>
          <div class="info-item"><label>ชื่อเล่น</label><p>เเก้ม</p></div>
          <div class="info-item"><label>วันเกิด</label><p>25 พฤศจิกายน 2551</p></div>
          <div class="info-item"><label>อายุ</label><p>17 ปี</p></div>
        </div>
      </div>
      <div class="info-card">
        <h2>ความสามารถพิเศษ</h2>
        <p>ร้องเพลง, เต้น, วาดรูป</p>
      </div>
    </section>
  </main>

  <div class="page-nav-wrapper">
    <a href="index.html" class="btn-nav">← ย้อนกลับ</a>
    <a href="education.html" class="btn-nav">ถัดไป →</a>
  </div>

</body>
</html>
